# Browser Configuration
browser=chrome
headless=false

# Application URL
base.url=https://www.flipkart.com

# Timeouts (in seconds)
implicit.wait=15
explicit.wait=20
page.load.timeout=40

# Test Data
search.keyword.valid=iPhone
search.keyword.invalid=xyzabc123@@@
search.keyword.electronics=Samsung TV
search.keyword.fashion=Nike Shoes

# Pincode
valid.pincode=400001
invalid.pincode=000000

# Resolution
browser.width=1920
browser.height=1080